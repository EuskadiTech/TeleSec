<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <title>Axia4</title>
  <link rel="icon" type="image/png" href="static/logo.jpg" />
  <!-- Font Awesome 5 -->
  <link href="static/adminlte/fontawesome.min.css" rel="stylesheet" />
  <!-- Bootstrap 4 -->
  <link href="static/adminlte/bootstrap.min.css" rel="stylesheet" />
  <!-- AdminLTE 3 -->
  <link href="static/adminlte/adminlte.min.css" rel="stylesheet" />
  <!-- TeleSec Custom -->
  <link href="static/telesec-custom.css" rel="stylesheet" />
  <!-- DataTables CSS -->
  <link href="static/adminlte/datatables/dataTables.bootstrap4.min.css" rel="stylesheet" />
  <!-- Toastr -->
  <link href="static/toastr.min.css" rel="stylesheet" />
  <!--%_PREFETCH_%-->
</head>

<body class="hold-transition sidebar-mini layout-fixed">
  <div class="wrapper">

    <!-- Top Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light no_print" id="header_hide_query">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" data-widget="pushmenu" href="#" role="button">
            <i class="fas fa-bars"></i>
          </a>
        </li>
        <li class="nav-item d-none d-sm-inline-block">
          <span class="nav-link ts-brand-name">Axia4</span>
        </li>
      </ul>
      <ul class="navbar-nav ml-auto align-items-center">
        <li class="nav-item d-none d-sm-flex align-items-center" style="gap: 4px;">
          <input type="text" id="quickSearchInput" class="form-control form-control-sm"
                 placeholder="Búsqueda rápida…"
                 onkeypress="if(event.key==='Enter') document.getElementById('quickSearchBtn').click()"
                 style="width: 200px;">
          <button id="quickSearchBtn" onclick="setUrlHash('buscar')" class="btn btn-sm btn-default border">
            <i class="fas fa-search"></i>
          </button>
        </li>
        <li class="nav-item">
          <a class="nav-link p-1" href="#">
            <img id="connectStatus" src="static/logo.jpg"
                 style="height: 28px; width: 28px; border-radius: 50%; cursor: pointer; object-fit: cover;"
                 title="Estado de conexión" />
          </a>
        </li>
      </ul>
    </nav>

    <!-- Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4 no_print">
      <a href="#index" class="brand-link text-center">
        <span class="brand-text font-weight-semibold">Axia4</span>
        ·
        <span class="brand-text font-weight-bold">%%EDITION%%</span>
      </a>
      <div class="sidebar">
        <!-- Búsqueda móvil -->
        <div class="form-inline d-sm-none mb-2 px-2">
          <div class="input-group w-100">
            <input class="form-control form-control-sidebar" type="search" id="quickSearchInputMobile"
                   placeholder="Buscar…" aria-label="Search"
                   onkeypress="if(event.key==='Enter'){ document.getElementById('quickSearchInput').value=this.value; setUrlHash('buscar'); }">
            <button class="btn btn-sidebar"
                    onclick="document.getElementById('quickSearchInput').value=document.getElementById('quickSearchInputMobile').value; setUrlHash('buscar');">
              <i class="fas fa-search fa-fw"></i>
            </button>
          </div>
        </div>
        <nav class="mt-2">
          <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu"
              data-accordion="false" id="appendApps2">
            <!-- Populated by SetPages() -->
          </ul>
        </nav>
      </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
      <section class="content">
        <div class="container-fluid">
          <main id="container" class="py-3"></main>
        </div>
      </section>
    </div>


  </div><!-- /.wrapper -->

  <!-- Loading overlay -->
  <img id="loading" src="load.gif"
       style="display: block; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
              width: calc(100% - 50px); max-width: 400px; z-index: 9999;" />

  <!-- Action status icon -->
  <img id="actionStatus" src="static/ico/statusok.png"
       style="z-index: 2048; margin: 0; position: fixed; top: 50%; left: 50%;
              transform: translate(-50%, -50%); width: 100px; height: 100px; display: none;" />

  <!-- Update snackbar -->
  <div id="snackbar">
    Hay una nueva versión de Axia4.<br /><a id="reload">Pulsa aqui para actualizar.</a>
  </div>

  <!-- Libraries -->
  <script src="static/aes.js"></script>
  <script src="static/showdown.min.js"></script>
  <script src="static/qrcode/html5-qrcode.min.js"></script>
  <script src="static/qrcode/barcode.js"></script>
  <script src="static/qrcode/qrcode.min.js"></script>
  <script src="static/jquery.js"></script>
  <!-- Bootstrap 4 bundle (includes Popper.js) -->
  <script src="static/adminlte/bootstrap.bundle.min.js"></script>
  <!-- Socket.IO client (served by Flask at /socket.io/socket.io.js) -->
  <!-- db.js will load it dynamically when needed -->
  <script src="static/toastr.min.js"></script>
  <script src="static/doublescroll.js"></script>
  <script src="static/chart.umd.min.js"></script>
  <!-- AdminLTE 3 -->
  <script src="static/adminlte/adminlte.min.js"></script>
  <!-- DataTables -->
  <script src="static/adminlte/datatables/jquery.dataTables.min.js"></script>
  <script src="static/adminlte/datatables/dataTables.bootstrap4.min.js"></script>
  <!-- Application -->
  %%APP_SCRIPTS%%
</body>

</html>
