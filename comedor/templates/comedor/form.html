{% extends "core/base.html" %}
{% block title %}{{ action }} Menú – TeleSec{% endblock %}
{% block content %}
<div class="mb-4">
  <h2 class="fw-bold"><i class="bi bi-cup-hot-fill text-primary me-2"></i>{{ action }} Menú</h2>
</div>
<div class="card shadow-sm" style="max-width: 700px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        {% for field in form %}
        <div class="col-md-6">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ action }}</button>
        <a href="{% url 'list_menus' %}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
