services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    image: ghcr.io/euskaditech/telesec-backend:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./telesec-data:/data
    environment:
      # Override these values with your own secrets.
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-long-random-string}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-too}
      DATABASE_PATH: /data/telesec.db
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}