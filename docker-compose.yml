services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: telesec-backend:latest
    container_name: telesec-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist the SQLite database outside the container
      - telesec-data:/data
    environment:
      # Override these values or use a .env file at the project root.
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-long-random-string}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-too}
      DATABASE_PATH: /data/telesec.db
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request, urllib.error; \
              req = urllib.request.Request('http://localhost:5000/api/auth/login', \
                data=b'{}', headers={'Content-Type':'application/json'}); \
              urllib.request.urlopen(req)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  telesec-data:
    driver: local
