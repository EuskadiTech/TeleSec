services:
  backend:
    build:
      context: .
      dockerfile: django/Dockerfile
    image: ghcr.io/euskaditech/telesec-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./telesec-data:/data
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-long-random-string}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-too}
      DATABASE_PATH: /data/telesec.db
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PORT: ${PORT:-8000}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      INSTANCE_PASSWORD: ${INSTANCE_PASSWORD:-}
      INSTANCE_NAME: ${INSTANCE_NAME:-TeleSec}
      KEYGEN_ACCOUNT_ID: ${KEYGEN_ACCOUNT_ID:-}