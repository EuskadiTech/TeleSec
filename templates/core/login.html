<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TeleSec – Iniciar sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
    .login-card { max-width: 400px; border-radius: 16px; border: none; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="login-card card shadow-lg p-4 w-100 mx-3">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
      <h1 class="h3 mt-2 fw-bold">TeleSec</h1>
      <p class="text-muted small">Comunicación distribuida segura</p>
    </div>

    {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-danger alert-sm py-2">
      <i class="bi bi-exclamation-triangle me-1"></i>{{ msg }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Código de grupo</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-people-fill"></i></span>
          <input type="text" name="group_code" class="form-control" placeholder="Ej: SCHOOL-2025"
                 value="{{ request.POST.group_code }}" required autofocus>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Nombre de usuario"
                 value="{{ request.POST.username }}" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
