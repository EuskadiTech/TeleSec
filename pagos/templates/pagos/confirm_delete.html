{% extends "core/base.html" %}
{% block title %}Eliminar Pago – TeleSec{% endblock %}
{% block content %}
<div class="card shadow-sm" style="max-width: 480px;">
  <div class="card-body text-center py-5">
    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
    <h4 class="mt-3">¿Eliminar pago de {{ pago.persona.nombre }}?</h4>
    <p class="text-muted">{{ pago.tipo }}: {{ pago.monto }} €</p>
    <form method="post" class="d-flex justify-content-center gap-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Eliminar</button>
      <a href="{% url 'list_pagos' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
