{% extends "core/base.html" %}
{% block title %}{{ action }} Persona – TeleSec{% endblock %}
{% block content %}
<div class="mb-4">
  <h2 class="fw-bold"><i class="bi bi-person-fill text-primary me-2"></i>{{ action }} Persona</h2>
</div>
<div class="card shadow-sm" style="max-width: 600px;">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
        {% endif %}
      </div>
      {% endfor %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ action }}
        </button>
        <a href="{% url 'list_personas' %}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
